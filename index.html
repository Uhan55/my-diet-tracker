<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balance Lab | 能量平衡实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --sage-green: #B2AC88;
            --dusty-blue: #96ADBD;
            --bg-blur: 20px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #222;
        }

        /* 背景层 */
        .background-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?auto=format&fit=crop&q=80&w=1000') no-repeat center center;
            background-size: cover;
            filter: blur(var(--bg-blur)) brightness(0.8);
            z-index: -1;
            transition: 0.5s;
        }

        /* 录入抽屉 - 提升 Z-index 确保可见 */
        .drawer {
            position: fixed;
            bottom: -100%; left: 0; width: 100%; height: 65vh;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            z-index: 9999; 
            transition: bottom 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            padding: 30px;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .drawer.open { bottom: 0; }

        .input-area {
            width: 100%; height: 100px;
            border: 2px solid #eee;
            background: #f9f9f9;
            border-radius: 15px;
            padding: 15px;
            font-size: 16px;
            outline: none;
            resize: none;
            margin-bottom: 20px;
        }

        .mic-btn {
            width: 70px; height: 70px;
            background: var(--sage-green);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(178, 172, 136, 0.4);
        }

        .food-tag {
            display: inline-block;
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 20px;
            margin: 5px;
            font-size: 13px;
            border: 1px dashed var(--sage-green);
        }

        /* 三层主容器 */
        .main-container {
            height: 300vh;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .section { height: 100vh; width: 100vw; position: relative; display: flex; justify-content: center; align-items: center; }

        /* 按钮设计 */
        .btn-circle {
            width: 100px; height: 100px; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; cursor: pointer; transition: 0.2s;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-plus { background: rgba(178, 172, 136, 0.9); }
        .btn-minus { background: rgba(150, 173, 189, 0.9); }

        /* 麻绳 Timeline */
        .rope-container { width: 100%; height: 2px; background: #8b7355; position: absolute; top: 50%; }
        .polaroid { width: 80px; height: 100px; background: white; padding: 5px; position: absolute; top: -110px; transform-origin: top center; animation: swing 3s ease-in-out infinite; cursor: pointer; }
        
        @keyframes swing { 0%, 100% { transform: rotate(3deg); } 50% { transform: rotate(-3deg); } }

        .stats-card { background: white; width: 90%; height: 60%; border-radius: 25px; padding: 25px; }
    </style>
</head>
<body>

    <div class="background-layer" id="bg"></div>

    <div class="drawer" id="intakeDrawer">
        <div class="w-16 h-1.5 bg-gray-200 rounded-full mx-auto mb-8 cursor-pointer" onclick="closeDrawer()"></div>
        <h3 class="text-xl font-bold mb-6 text-center text-gray-800">🧪 能量采样中...</h3>
        
        <div class="mic-btn" onclick="simulateVoice()">🎙️</div>
        
        <textarea class="input-area" id="foodInput" placeholder="请输入你吃的食物，例如：两串二哥烧烤，一份凉面..."></textarea>
        
        <div id="tagArea" class="flex flex-wrap justify-center mb-8">
            </div>

        <button class="w-full py-4 bg-black text-white rounded-2xl font-bold active:scale-95 transition-transform" onclick="confirmIntake()">确认挂上麻绳</button>
    </div>

    <div class="main-container" id="main">
        
        <div class="section">
            <div class="rope-container">
                <div class="polaroid" style="left: 25%;" onclick="pullRope(this)">
                    <div class="w-full h-[70px] bg-gray-100 flex items-center justify-center text-xs">📷</div>
                    <p class="text-[10px] mt-1 text-center">早饭</p>
                </div>
            </div>
            <div class="absolute bottom-10 text-white opacity-40">下滑返回主页</div>
        </div>

        <div class="section">
            <div class="flex flex-col items-center mb-20">
                <h2 class="text-white text-4xl font-light mb-2">Today</h2>
                <p class="text-white opacity-60">April 2nd, 2026</p>
            </div>
            
            <div class="flex gap-10 absolute">
                <div class="btn-circle btn-plus" onclick="openIntake()">
                    <span class="text-4xl">+</span>
                    <span class="text-[12px] mt-1">能量摄入</span>
                </div>
                <div class="btn-circle btn-minus" onclick="alert('即将开启运动录入抽屉')">
                    <span class="text-4xl">-</span>
                    <span class="text-[12px] mt-1">能量消耗</span>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="stats-card shadow-2xl">
                <h3 class="font-bold text-gray-800 mb-6">每周复盘 (Kcal)</h3>
                <div class="flex justify-around items-end h-40 border-b border-gray-100 pb-2">
                    <div class="w-6 bg-[#B2AC88] h-32 rounded-t"></div>
                    <div class="w-6 bg-[#96ADBD] h-24 rounded-t"></div>
                    <div class="w-6 bg-[#B2AC88] h-20 rounded-t"></div>
                    <div class="w-6 bg-[#96ADBD] h-36 rounded-t"></div>
                </div>
                <p class="text-center text-xs text-gray-400 mt-6">基础代谢：1550 kcal</p>
            </div>
        </div>

    </div>

    <script>
        let currentPos = 1;
        const main = document.getElementById('main');
        const drawer = document.getElementById('intakeDrawer');
        const bg = document.getElementById('bg');

        // 滑动逻辑
        let startY;
        window.addEventListener('touchstart', e => startY = e.touches[0].pageY);
        window.addEventListener('touchend', e => {
            if(drawer.classList.contains('open')) return;
            const deltaY = e.changedTouches[0].pageY - startY;
            if (Math.abs(deltaY) > 60) {
                if (deltaY > 0 && currentPos > 0) currentPos--;
                else if (deltaY < 0 && currentPos < 2) currentPos++;
                main.style.transform = `translateY(-${currentPos * 100}vh)`;
                bg.style.filter = currentPos === 2 ? "blur(40px) brightness(0.6)" : "blur(20px) brightness(0.8)";
            }
        });

        // 抽屉函数
        function openIntake() {
            drawer.classList.add('open');
        }

        function closeDrawer() {
            drawer.classList.remove('open');
        }

        // 模拟语音录入
        function simulateVoice() {
            const input = document.getElementById('foodInput');
            input.value = "";
            input.placeholder = "👂 正在听你说话...";
            setTimeout(() => {
                input.value = "晚上吃了两串二哥烧烤，喝了一杯冰可乐";
                document.getElementById('tagArea').innerHTML = `
                    <span class="food-tag">🍢 烧烤 x2</span>
                    <span class="food-tag">🥤 可乐 x1</span>
                `;
            }, 1500);
        }

        function confirmIntake() {
            const btn = event.currentTarget;
            btn.innerText = "已录入成功 ✅";
            btn.style.backgroundColor = "#4CAF50";
            setTimeout(() => {
                closeDrawer();
                btn.innerText = "确认挂上麻绳";
                btn.style.backgroundColor = "black";
            }, 1000);
        }

        function pullRope(el) {
            el.style.transition = "transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
            el.style.transform = "translateY(280px) scale(3)";
            el.style.zIndex = "1000";
            setTimeout(() => {
                prompt("修改记录内容：", el.innerText);
                el.style.transform = "translateY(0) scale(1)";
                el.style.zIndex = "1";
            }, 800);
        }

        // 初始化
        main.style.transform = `translateY(-${currentPos * 100}vh)`;
    </script>
</body>
</html>
