<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balance Lab | 能量平衡实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --sage-green: #B2AC88;
            --dusty-blue: #96ADBD;
            --bg-blur: 25px;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1a; font-family: 'PingFang SC', sans-serif; }

        /* 动态模糊背景 */
        .background-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?auto=format&fit=crop&q=80&w=1000') no-repeat center center;
            background-size: cover; filter: blur(var(--bg-blur)) brightness(0.7); z-index: -1; transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 录入抽屉 */
        .drawer {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 75vh;
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(20px);
            border-top-left-radius: 40px; border-top-right-radius: 40px;
            z-index: 9999; transition: bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 25px; box-shadow: 0 -20px 50px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
        }
        .drawer.open { bottom: 0; }

        /* 多模态功能条 */
        .media-actions { display: flex; justify-content: space-around; margin-bottom: 25px; }
        .action-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; transition: 0.2s;
        }
        .action-item:active { transform: scale(0.9); }
        .action-icon {
            width: 55px; height: 55px; border-radius: 18px;
            background: #f0f0f0; display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: #444;
        }

        .input-area {
            width: 100%; height: 120px; border: 1.5px solid #eee; background: #fafafa;
            border-radius: 20px; padding: 18px; font-size: 16px; outline: none; resize: none; margin-bottom: 20px;
        }

        /* 主容器 */
        .main-container { height: 300vh; transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1); }
        .section { height: 100vh; width: 100vw; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* 时间标题区 - 向上挪并优化 */
        .header-info { position: absolute; top: 15%; text-align: center; pointer-events: none; }
        .date-card {

            padding: 15px 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.15);
        }
