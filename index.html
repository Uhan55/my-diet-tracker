<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balance Lab | 能量平衡实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <style>
        :root { --sage-green: #B2AC88; --dusty-blue: #96ADBD; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1a; font-family: 'PingFang SC', sans-serif; }
        .background-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?auto=format&fit=crop&q=80&w=1000') no-repeat center center; background-size: cover; filter: blur(25px) brightness(0.7); z-index: -1; }
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; height: 80vh; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); border-top-left-radius: 40px; border-top-right-radius: 40px; z-index: 9999; transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding: 25px; box-shadow: 0 -20px 50px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .drawer.open { bottom: 0; }
        .action-icon { width: 55px; height: 55px; border-radius: 18px; background: #f5f5f5; display: flex; justify-content: center; align-items: center; font-size: 24px; }
        .recording .action-icon { background: #fee2e2; color: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .input-area { width: 100%; height: 110px; border: 1.5px solid #eee; background: #fafafa; border-radius: 20px; padding: 15px; font-size: 15px; outline: none; resize: none; line-height: 1.6; }
        .analyze-btn { background: #3b82f6; color: white; padding: 14px; border-radius: 18px; font-weight: 800; font-size: 14px; margin: 15px 0; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .main-container { height: 300vh; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .section { height: 100vh; width: 100vw; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .rope-container { width: 100%; height: 3px; background: #6b5344; position: absolute; top: 50%; }
        .polaroid { width: 85px; height: 110px; background: white; padding: 6px; position: absolute; top: -120px; transform-origin: top center; animation: swing 4s infinite; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        @keyframes swing { 0%, 100% { transform: rotate(2deg); } 50% { transform: rotate(-2deg); } }
        #cameraInput, #albumInput { display: none; }
        .food-tag { display: inline-block; padding: 5px 12px; background: #f0f0f0; border-radius: 12px; margin: 3px; font-size: 11px; border: 1px dashed #ccc; font-weight: bold; }
    </style>
</head>
<body>

    <div class="background-layer" id="bg"></div>

    <div class="drawer" id="intakeDrawer">
        <div class="w-16 h-1.5 bg-gray-200 rounded-full mx-auto mb-6 cursor-pointer" onclick="closeDrawer()"></div>
        
        <input type="file" id="cameraInput" accept="image/*" capture="camera">
        <input type="file" id="albumInput" accept="image/*">

        <div class="flex justify-around mb-6">
            <div class="flex flex-col items-center gap-2" onclick="document.getElementById('cameraInput').click()">
                <div class="action-icon">📷</div><span class="text-[10px] text-gray-400 font-bold">相机</span>
            </div>
            <div class="flex flex-col items-center gap-2" onclick="document.getElementById('albumInput').click()">
                <div class="action-icon">🖼️</div><span class="text-[10px] text-gray-400 font-bold">相册</span>
            </div>
            <div id="voiceToggleBtn" class="flex flex-col items-center gap-2" onclick="toggleVoice()">
                <div class="action-icon" id="voiceIcon">🎙️</div><span class="text-[10px] text-gray-400 font-bold">语音</span>
            </div>
        </div>
        
        <textarea class="input-area shadow-sm" id="foodInput" placeholder="描述你的实验样本..."></textarea>
        
        <button class="analyze-btn" id="analyzeBtn" onclick="triggerAIAnalysis()">🔥 热量分析</button>

        <div id="tagArea" class="flex flex-wrap justify-center mb-4 overflow-y-auto max-h-20 text-center"></div>
        
        <button id="confirmBtn" class="w-full py-4 bg-black text-white rounded-2xl font-bold opacity-40 transition-all" onclick="confirmIntake()" disabled>同步至麻绳</button>
        <p class="text-[10px] text-center mt-4 text-gray-400 cursor-pointer underline" onclick="resetKey()">[ 实验授权重置 ]</p>
    </div>

    <div class="main-container" id="main">
        <div class="section"><div class="rope-container" id="ropeContainer"></div></div>
        <div class="section">
            <div class="bg-white/10 backdrop-blur-lg p-6 rounded-3xl border border-white/20 text-center">
                <h2 class="text-white text-3xl font-light tracking-[0.3em]">LAB.TODAY</h2>
                <p class="text-white/60 text-[10px] mt-2 uppercase tracking-widest">Akron • April 2, 2026</p>
            </div>
            <div class="flex gap-10 mt-12">
                <div class="w-24 h-24 rounded-full bg-[#B2AC88] flex flex-col items-center justify-center text-white shadow-xl" onclick="openIntake()">
                    <span class="text-3xl">+</span><span class="text-[10px] font-bold uppercase">Intake</span>
                </div>
            </div>
        </div>
        <div class="section"><div class="text-gray-500 uppercase tracking-widest">Data Analysis</div></div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // 安全获取 Key
        function getSafeKey() {
            let key = localStorage.getItem('GEMINI_LAB_KEY');
            if (!key || key.length < 15) {
                key = prompt("🧪 实验室授权：请输入您的 Gemini API Key");
                if (key) localStorage.setItem('GEMINI_LAB_KEY', key.trim());
            }
            return key;
        }

        window.resetKey = () => { localStorage.removeItem('GEMINI_LAB_KEY'); location.reload(); };

        let currentPos = 1;
        let isRecording = false;
        let recognition = null;
        let lastImageData = null;

        const main = document.getElementById('main');
        const drawer = document.getElementById('intakeDrawer');
        const foodInput = document.getElementById('foodInput');
        const tagArea = document.getElementById('tagArea');
        const ropeContainer = document.getElementById('ropeContainer');
        const confirmBtn = document.getElementById('confirmBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');

        window.openIntake = () => drawer.classList.add('open');
        window.closeDrawer = () => drawer.classList.remove('open');

        // 滑动
        let startY;
        window.addEventListener('touchstart', e => startY = e.touches[0].pageY);
        window.addEventListener('touchend', e => {
            if(drawer.classList.contains('open')) return;
            const deltaY = e.changedTouches[0].pageY - startY;
            if (Math.abs(deltaY) > 70) {
                if (deltaY > 0 && currentPos > 0) currentPos--;
                else if (deltaY < 0 && currentPos < 2) currentPos++;
                main.style.transform = `translateY(-${currentPos * 100}vh)`;
            }
        });

        // 核心 AI 调用
        window.triggerAIAnalysis = async () => {
            const KEY = getSafeKey();
            if(!KEY) return;

            analyzeBtn.innerText = "⚡ 正在连接云端实验室...";
            tagArea.innerHTML = '<span class="text-xs text-blue-500 animate-pulse">正在进行多模态分析...</span>';
            
            try {
                const genAI = new GoogleGenerativeAI(KEY);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const prompt = "你是专业营养师。请分析该食物。第一行名称，第二行卡路里数字，第三行简短建议。";
                
                let result;
                if (lastImageData) {
                    result = await model.generateContent([prompt, { inlineData: { data: lastImageData.split(",")[1], mimeType: "image/jpeg" } }]);
                } else {
                    result = await model.generateContent(prompt + " 描述内容：" + foodInput.value);
                }

                const response = await result.response;
                const text = response.text();
                
                const lines = text.split('\n').filter(l => l.trim() !== "");
                tagArea.innerHTML = `<span class="food-tag">✅ ${lines[0]}</span><span class="food-tag">🔥 ${lines[1]} kcal</span>`;
                
                confirmBtn.dataset.latest = `${lines[0]}|${lines[1]}`;
                confirmBtn.disabled = false;
                confirmBtn.classList.remove('opacity-40');
                analyzeBtn.innerText = "🔥 分析成功";
                analyzeBtn.style.background = "#10b981";

            } catch (err) {
                console.error("DEBUG ERROR:", err);
                analyzeBtn.innerText = "🔥 重新分析";
                tagArea.innerHTML = `<span class="text-[10px] text-red-500 font-bold">❌ 传送失败：请确保梯子开启全局模式</span>`;
                foodInput.value += `\n\n[故障详情]: ${err.message}`;
            }
        };

        // 语音
        window.toggleVoice = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("不支持语音");
            const btn = document.getElementById('voiceToggleBtn');
            if (!isRecording) {
                recognition = new SpeechRecognition();
                recognition.lang = 'zh-CN';
                recognition.onstart = () => { isRecording = true; btn.classList.add('recording'); foodInput.value = ""; };
                recognition.onresult = (e) => { foodInput.value = e.results[0][0].transcript; };
                recognition.start();
            } else {
                recognition.stop(); isRecording = false; btn.classList.remove('recording');
            }
        };

        // 图片
        document.getElementById('cameraInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (evt) => { lastImageData = evt.target.result; foodInput.value = "[图片采样成功]"; tagArea.innerHTML = "📸 待分析"; };
            reader.readAsDataURL(e.target.files[0]);
        };
        document.getElementById('albumInput').onchange = document.getElementById('cameraInput').onchange;

        // 同步
        window.confirmIntake = () => {
            const data = confirmBtn.dataset.latest;
            const [name, cals] = data.split('|');
            const card = document.createElement('div');
            card.className = 'polaroid';
            card.style.left = `${Math.random() * 60 + 10}%`;
            card.innerHTML = `
                <div class="w-full h-[75px] bg-gray-50 flex items-center justify-center text-2xl">🍽️</div>
                <p class="text-[9px] mt-2 text-center text-gray-500 font-bold uppercase">${name}</p>
                <p class="text-[8px] text-center text-red-400 font-bold">${cals} KCAL</p>
            `;
            ropeContainer.appendChild(card);
            closeDrawer();
        };

        main.style.transform = "translateY(-100vh)";
    </script>
</body>
</html>
