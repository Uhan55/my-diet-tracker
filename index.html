<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balance Lab | 能量平衡实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <style>
        :root { --sage-green: #B2AC88; --dusty-blue: #96ADBD; --bg-blur: 25px; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1a; font-family: 'PingFang SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .background-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?auto=format&fit=crop&q=80&w=1000') no-repeat center center; background-size: cover; filter: blur(var(--bg-blur)) brightness(0.7); z-index: -1; transition: 0.8s; }
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; height: 75vh; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); border-top-left-radius: 40px; border-top-right-radius: 40px; z-index: 9999; transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding: 25px; box-shadow: 0 -20px 50px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .drawer.open { bottom: 0; }
        .media-actions { display: flex; justify-content: space-around; margin-bottom: 25px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .action-icon { width: 60px; height: 60px; border-radius: 20px; background: #f5f5f5; display: flex; justify-content: center; align-items: center; font-size: 26px; transition: 0.3s; }
        
        /* 录入时的红灯闪烁效果 */
        .recording .action-icon { background: #fee2e2; color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .input-area { width: 100%; height: 120px; border: 1.5px solid #eee; background: #fafafa; border-radius: 20px; padding: 18px; font-size: 15px; outline: none; resize: none; margin-bottom: 15px; line-height: 1.6; }
        .main-container { height: 300vh; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .section { height: 100vh; width: 100vw; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .header-info { position: absolute; top: 10%; text-align: center; width: 100%; }
        .date-card { display: inline-block; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 12px 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); }
        .control-panel { display: flex; gap: 40px; margin-top: 60px; }
        .btn-circle { width: 100px; height: 100px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn-plus { background: var(--sage-green); }
        .btn-minus { background: var(--dusty-blue); }
        .rope-container { width: 100%; height: 3px; background: #6b5344; position: absolute; top: 50%; }
        .polaroid { width: 85px; height: 110px; background: white; padding: 6px; position: absolute; top: -120px; transform-origin: top center; animation: swing 4s infinite; box-shadow: 0 8px 20px rgba(0,0,0,0.2); cursor: pointer; z-index: 10; }
        @keyframes swing { 0%, 100% { transform: rotate(2deg); } 50% { transform: rotate(-2deg); } }
        #cameraInput, #albumInput { display: none; }
        .food-tag { display: inline-block; padding: 6px 12px; background: #f0f0f0; border-radius: 15px; margin: 4px; font-size: 12px; border: 1px dashed #ccc; }
    </style>
</head>
<body>

    <div class="background-layer" id="bg"></div>

    <div class="drawer" id="intakeDrawer">
        <div class="w-16 h-1.5 bg-gray-200 rounded-full mx-auto mb-6 cursor-pointer" onclick="closeDrawer()"></div>
        <h3 class="text-lg font-bold mb-6 text-center text-gray-700">🔬 实时能量采样解析</h3>
        
        <input type="file" id="cameraInput" accept="image/*" capture="camera">
        <input type="file" id="albumInput" accept="image/*">

        <div class="media-actions">
            <div class="action-item" onclick="document.getElementById('cameraInput').click()">
                <div class="action-icon">📷</div><span class="text-[10px] text-gray-400 font-bold uppercase">Photo</span>
            </div>
            <div class="action-item" onclick="document.getElementById('albumInput').click()">
                <div class="action-icon">🖼️</div><span class="text-[10px] text-gray-400 font-bold uppercase">Album</span>
            </div>
            <div id="voiceToggleBtn" class="action-item" onclick="toggleVoice()">
                <div class="action-icon" id="voiceIcon">🎙️</div><span class="text-[10px] text-gray-400 font-bold uppercase">Voice</span>
            </div>
        </div>
        
        <textarea class="input-area" id="foodInput" placeholder="描述饮食或点击🎙️开始录音..."></textarea>
        <div id="tagArea" class="flex flex-wrap justify-center mb-6 overflow-y-auto max-h-24"></div>
        <button id="confirmBtn" class="w-full py-4 bg-black text-white rounded-2xl font-bold active:scale-95 transition-all" onclick="confirmIntake()">同步至实验室麻绳</button>
    </div>

    <div class="main-container" id="main">
        <div class="section">
            <div class="rope-container" id="ropeContainer"></div>
            <div class="absolute bottom-10 text-white opacity-40 text-xs tracking-widest uppercase">My Footprints</div>
        </div>
        <div class="section">
            <div class="header-info"><div class="date-card">
                <h2 class="text-white text-3xl font-light tracking-[0.2em]">LAB.TODAY</h2>
                <p class="text-white/60 text-[10px] mt-1 uppercase tracking-widest">Akron, OH • April 2, 2026</p>
            </div></div>
            <div class="control-panel">
                <div class="btn-circle btn-plus" onclick="openIntake()"><span class="text-4xl">+</span><span class="text-[10px] mt-2 font-bold uppercase tracking-widest">Intake</span></div>
                <div class="btn-circle btn-minus" onclick="alert('即将开启消耗录入')"><span class="text-4xl">−</span><span class="text-[10px] mt-2 font-bold uppercase tracking-widest">Burn</span></div>
            </div>
        </div>
        <div class="section">
            <div class="w-[88%] h-[60%] bg-white/95 rounded-[35px] p-8 shadow-2xl">
                <h3 class="font-bold text-gray-800 text-lg mb-8 tracking-tight uppercase">Analysis</h3>
                <div class="flex justify-around items-end h-40 border-b border-gray-100 pb-4">
                    <div class="w-8 bg-[#B2AC88] h-32 rounded-t-xl"></div>
                    <div class="w-8 bg-[#96ADBD] h-20 rounded-t-xl"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const API_KEY = "AIzaSyDWZF-sQom_cnm7RMEKY33TGpNbpz1mkfQ";
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        let currentPos = 1;
        let isRecording = false;
        let recognition = null;
        const main = document.getElementById('main');
        const drawer = document.getElementById('intakeDrawer');
        const bg = document.getElementById('bg');
        const foodInput = document.getElementById('foodInput');
        const tagArea = document.getElementById('tagArea');
        const ropeContainer = document.getElementById('ropeContainer');

        window.openIntake = () => drawer.classList.add('open');
        window.closeDrawer = () => drawer.classList.remove('open');

        // 滑动控制
        let startY;
        window.addEventListener('touchstart', e => startY = e.touches[0].pageY);
        window.addEventListener('touchend', e => {
            if(drawer.classList.contains('open')) return;
            const deltaY = e.changedTouches[0].pageY - startY;
            if (Math.abs(deltaY) > 70) {
                if (deltaY > 0 && currentPos > 0) currentPos--;
                else if (deltaY < 0 && currentPos < 2) currentPos++;
                main.style.transform = `translateY(-${currentPos * 100}vh)`;
                bg.style.filter = `blur(${currentPos === 2 ? 45 : 25}px) brightness(${currentPos === 2 ? 0.5 : 0.7})`;
            }
        });

        // AI 解析逻辑
        async function runAI(content, isImage = false) {
            tagArea.innerHTML = '<span class="animate-pulse text-xs text-orange-600 font-bold tracking-tighter">🧪 AI 正在建立营养模型...</span>';
            foodInput.value = "数据已送达，正在计算热量...";
            
            try {
                const prompt = "你是一位资深营养师。请分析该食物。第一行：食物名；第二行：热量(仅数字)；第三行：一句话营养点评。";
                let result;
                if (isImage) {
                    result = await model.generateContent([prompt, { inlineData: { data: content.split(",")[1], mimeType: "image/jpeg" } }]);
                } else {
                    result = await model.generateContent([prompt, content]);
                }

                const text = await result.response.text();
                foodInput.value = text;
                const lines = text.split('\n').filter(l => l.trim() !== "");
                tagArea.innerHTML = `<span class="food-tag">✅ ${lines[0]}</span><span class="food-tag">🔥 ${lines[1]} kcal</span>`;
                document.getElementById('confirmBtn').dataset.latest = `${lines[0]}|${lines[1]}`;
            } catch (err) {
                tagArea.innerHTML = '<span class="text-xs text-red-500">❌ AI 响应超时</span>';
            }
        }

        // 核心：语音开关切换逻辑
        window.toggleVoice = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("浏览器不支持");

            const iconBtn = document.getElementById('voiceToggleBtn');
            const icon = document.getElementById('voiceIcon');

            if (!isRecording) {
                // 开始录音
                recognition = new SpeechRecognition();
                recognition.lang = 'zh-CN';
                recognition.continuous = true; // 允许长句

                recognition.onstart = () => {
                    isRecording = true;
                    iconBtn.classList.add('recording');
                    icon.innerHTML = "🔴";
                    foodInput.placeholder = "录音中，再次点击停止...";
                    foodInput.value = "";
                };

                recognition.onresult = (e) => {
                    const transcript = Array.from(e.results)
                        .map(result => result[0])
                        .map(result => result.transcript)
                        .join('');
                    foodInput.value = transcript;
                };

                recognition.onerror = () => stopLogic();
                recognition.start();
            } else {
                // 停止录音
                stopLogic();
                if (foodInput.value.length > 1) {
                    runAI(foodInput.value, false);
                }
            }
        };

        function stopLogic() {
            if (recognition) recognition.stop();
            isRecording = false;
            document.getElementById('voiceToggleBtn').classList.remove('recording');
            document.getElementById('voiceIcon').innerHTML = "🎙️";
            foodInput.placeholder = "解析中...";
        }

        // 图片监听
        const fileHandler = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => runAI(evt.target.result, true);
            reader.readAsDataURL(file);
        };
        document.getElementById('cameraInput').onchange = fileHandler;
        document.getElementById('albumInput').onchange = fileHandler;

        // 同步逻辑
        window.confirmIntake = () => {
            const data = document.getElementById('confirmBtn').dataset.latest;
            if (!data) return alert("请等待 AI 解析");
            const [name, cals] = data.split('|');
            const card = document.createElement('div');
            card.className = 'polaroid';
            card.style.left = `${Math.random() * 60 + 10}%`;
            card.innerHTML = `
                <div class="w-full h-[75px] bg-gray-100 flex items-center justify-center text-2xl">📸</div>
                <p class="text-[9px] mt-2 text-center text-gray-500 font-bold uppercase tracking-tighter">${name}</p>
                <p class="text-[8px] text-center text-red-400 font-bold">-${cals}KCAL</p>
            `;
            card.onclick = function() {
                this.style.transition = "0.5s";
                this.style.transform = "translateY(280px) scale(3)";
                setTimeout(() => { this.style.transform = "translateY(0) scale(1)"; }, 2000);
            };
            ropeContainer.appendChild(card);
            const btn = document.getElementById('confirmBtn');
            btn.innerText = "已收录成功 ✅"; btn.style.backgroundColor = "#4CAF50";
            setTimeout(() => { closeDrawer(); btn.innerText = "同步至实验室麻绳"; btn.style.backgroundColor = "black"; }, 1000);
        };

        main.style.transform = "translateY(-100vh)";
    </script>
</body>
</html>
